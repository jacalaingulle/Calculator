<div id="backdrop">
  <div id="main-container">
    <div id="screen">
      <p id="preview" [class.no-preview]="service.preview() === 'n'">{{ service.preview() }}</p>
      <p id="input" [title]="service.input()">{{ service.input() }}</p>
    </div>
    <div id="button-container">
      <button style="background: linear-gradient(120deg, #6c6c6c, #a0a0a0);" (click)="clearAll()">C</button>
      <button style="background: linear-gradient(120deg, #6c6c6c, #a0a0a0);" (click)="numberClicked('%'); service.percent.set(true);">%</button>
      <button style="background: linear-gradient(120deg, #6c6c6c, #a0a0a0);" (click)="backspace()">⌫</button>
      <button class="operator" (click)="operatorClicked('÷')">÷</button>
      <button (click)="numberClicked('7')">7</button>
      <button (click)="numberClicked('8')">8</button>
      <button (click)="numberClicked('9')">9</button>
      <button class="operator" (click)="operatorClicked('×')">×</button>
      <button (click)="numberClicked('4')">4</button>
      <button (click)="numberClicked('5')">5</button>
      <button (click)="numberClicked('6')">6</button>
      <button class="operator" (click)="operatorClicked('−')">−</button>
      <button (click)="numberClicked('1')">1</button>
      <button (click)="numberClicked('2')">2</button>
      <button (click)="numberClicked('3')">3</button>
      <button class="operator" (click)="operatorClicked('+')">+</button>
      <button (click)="toggleType()">+/-</button>
      <button (click)="numberClicked('0')">0</button>
      <button (click)="numberClicked('.')">.</button>
      <button class="operator" (click)="calculate()" [disabled]="!service.enableEquals()">=</button>
    </div>
  </div>
</div>
